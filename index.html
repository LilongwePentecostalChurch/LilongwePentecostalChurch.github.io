
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Lilongwe Pentecostal Church</title>
      <meta name="description" content="Lilongwe Pentecostal Church — a Spirit-filled church in Lilongwe, Malawi. Join us for worship, Bible study, and community. Growing Stronger in Christ." />

      <!-- Open Graph / Facebook / WhatsApp -->
      <meta property="og:type" content="website" />
      <meta property="og:url" content="https://lilongwepentecostalchurch.github.io/Design-LPC-Responsive-Website---new-and-better/" />
      <meta property="og:title" content="Lilongwe Pentecostal Church" />
      <meta property="og:description" content="A Spirit-filled church in Lilongwe, Malawi. Join us for worship, Bible study, and community. Growing Stronger in Christ." />
      <meta property="og:site_name" content="Lilongwe Pentecostal Church" />

      <!-- Twitter / X -->
      <meta name="twitter:card" content="summary" />
      <meta name="twitter:title" content="Lilongwe Pentecostal Church" />
      <meta name="twitter:description" content="A Spirit-filled church in Lilongwe, Malawi. Join us for worship, Bible study, and community. Growing Stronger in Christ." />

      <!-- Preconnect to font CDNs for faster loading -->
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link rel="preconnect" href="https://fonts.cdnfonts.com" />
      <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
      <!-- GitHub Pages SPA redirect handler -->
      <script>
        (function(l) {
          if (l.search[1] === '/') {
            var decoded = l.search.slice(1).split('&').map(function(s) {
              return s.replace(/~and~/g, '&')
            }).join('?');
            window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
            );
          }
        }(window.location))
      </script>
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
